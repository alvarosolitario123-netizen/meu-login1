<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Login</title>
  <style>
    body {
      background-color: lightblue;
      font-family: Arial;
    }

    h1 {
      text-align: center;
    }

    .caixa {
      background-color: white;
      width: 300px;
      margin: 100px auto;
      padding: 20px;
      border: 1px solid gray;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: darkblue;
    }

    p {
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="caixa">
    <h1>Login</h1>

    <label>Email:</label>
    <input type="email" placeholder="Digite seu email">

    <label>Senha:</label>
    <input type="password" placeholder="Digite sua senha">

    <button>Entrar</button>

    <p><a href="#">Esqueceu a senha?</a></p>
  </div>

</body>
</html>
